name: bizrato_owner
description: Bizrato Owner app.
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  fl_chart: ^0.70.2
  percent_indicator: ^4.2.3
  camera: ^0.11.0+2
  file_picker: ^8.1.7
  intl: ^0.20.1
  dio: any
  http: ^1.1.0
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_image_compress: ^2.3.0
  pinput: ^2.2.12
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.1
  youtube_player_flutter: ^9.1.1
  web_socket_channel: ^2.4.0
  image_picker: ^1.2.1
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.2
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
