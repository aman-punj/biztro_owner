name: Firebase App Distribution

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - both
      testers:
        description: 'Tester groups (comma separated)'
        required: false
        default: 'testers'
      release_notes:
        description: 'Release notes'
        required: false
        default: 'Manual build from GitHub Actions'

jobs:
  build-android:
    name: Build & Distribute Android
    if: github.event_name == 'push' || inputs.platform == 'android' || inputs.platform == 'both'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload to Firebase App Distribution
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
          --app ${{ secrets.FIREBASE_APP_ID_ANDROID }} \
          --groups "${{ github.event.inputs.testers || 'testers' }}" \
          --release-notes "${{ github.event.inputs.release_notes || 'Automated build' }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  build-ios:
    name: Build & Distribute iOS
    if: github.event_name == 'push' || inputs.platform == 'ios' || inputs.platform == 'both'
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app-release.ipa Payload/
          mv app-release.ipa build/ios/iphoneos/

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload to Firebase App Distribution
        run: |
          firebase appdistribution:distribute build/ios/iphoneos/app-release.ipa \
          --app ${{ secrets.FIREBASE_APP_ID_IOS }} \
          --groups "${{ github.event.inputs.testers || 'testers' }}" \
          --release-notes "${{ github.event.inputs.release_notes || 'Automated build' }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}